<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | PFMS</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <aside class="sidebar">
    <a class="logo" href="dashboard.html"><span>PF</span><b>PFMS</b></a>
    <nav class="nav">
      <a href="dashboard.html" data-page="dashboard">Dashboard</a>
      <a href="transactions.html" data-page="transactions">Transactions</a>
      <a href="budget.html" data-page="budget">Budget</a>
      <a href="savings.html" data-page="savings">Savings</a>
      <a href="reports.html" data-page="reports">Reports</a>
    </nav>
    <button class="ghost-btn logout-btn" id="logoutBtn">Logout</button>
  </aside>

  <main class="app-main">
    <header class="topbar">
      <div>
        <p class="eyebrow">Finance overview</p>
        <h1>Dashboard</h1>
      </div>
      <div class="user-pill" id="userPill"></div>
    </header>

    <section class="metric-grid">
      <article class="metric-card balance">
        <span class="metric-icon">Rs</span>
        <p>Current Balance</p>
        <h2 id="currentBalance">Loading</h2>
      </article>
      <article class="metric-card">
        <span class="metric-icon income">IN</span>
        <p>Total Income</p>
        <h2 id="totalIncome">Loading</h2>
      </article>
      <article class="metric-card">
        <span class="metric-icon expense">EX</span>
        <p>Total Expenses</p>
        <h2 id="totalExpense">Loading</h2>
      </article>
      <article class="metric-card">
        <span class="metric-icon saving">SG</span>
        <p>Savings Tracked</p>
        <h2 id="totalSavings">Loading</h2>
      </article>
    </section>

    <section class="content-grid">
      <article class="panel chart-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Actual data</p>
            <h2>Money Flow</h2>
          </div>
        </div>
        <canvas id="financeChart" height="230"></canvas>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Recent ledger</p>
            <h2>Latest Transactions</h2>
          </div>
          <a class="link-btn" href="transactions.html">Add entry</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Date</th><th>Type</th><th>Category</th><th>Amount</th></tr>
            </thead>
            <tbody id="recentTransactions"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
